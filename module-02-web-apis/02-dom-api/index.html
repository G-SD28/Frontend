<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM API</title>
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1>DOM API</h1>
    <h2 id="sub-heading">JavaScript is cool!</h2>
    <button id="change-color-btn" class="btn btn-primary btn-soft">Change color</button>
    <form>
      <label for="new-paragraph" class="sr-only">Euer Text:</label>
      <!-- <input type="text" name="new-paragraph" id="new-paragraph" required /> -->
      <input type="text" name="new-paragraph" id="new-paragraph" />
      <button class="btn btn-secondary btn-soft" type="submit">Add para</button>
      <button class="btn btn-soft" type="reset">Reset</button>
    </form>

    <div class="para-container">
      <p class="para">This is para one</p>
      <p class="para">This is para two</p>
      <p class="para">This is para three</p>
      <p class="para">This is para four</p>
    </div>
  </body>
</html>
